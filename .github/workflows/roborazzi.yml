name: Roborazzi

on:
  push:
    branches:
      - main
    paths:
      - 'app/**'
      - 'gradle/**'
      - 'scripts/**'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
      - 'gradle.properties'
      - 'gradlew'
      - 'gradlew.bat'
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  roborazzi:
    runs-on: macos-latest
    timeout-minutes: 30

    permissions:
      contents: read
      actions: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect Roborazzi-relevant changes
        id: changes
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
          else
            BASE="${{ github.event.before }}"
          fi

          if git diff --name-only "$BASE" HEAD | grep -qE \
            '^(app/|gradle/|scripts/|build\.gradle\.kts|settings\.gradle\.kts|gradle\.properties|gradlew|gradlew\.bat)'; then
            echo "run_tests=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_tests=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip Roborazzi (docs only)
        if: steps.changes.outputs.run_tests != 'true'
        run: echo "No app or build changes — Roborazzi tests not required."

      - name: Set up JDK 21
        if: steps.changes.outputs.run_tests == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle
        if: steps.changes.outputs.run_tests == 'true'
        uses: gradle/actions/setup-gradle@v4

      - name: Run Roborazzi tests
        if: steps.changes.outputs.run_tests == 'true'
        run: ./gradlew :app:testDebugUnitTest --stacktrace

      - name: Save PR number
        if: failure() && github.event_name == 'pull_request'
        run: |
          mkdir -p pr
          echo "${{ github.event.pull_request.number }}" > ./pr/NR

      - name: Upload PR number
        if: failure() && github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: pr
          path: pr/

      - name: Upload diff artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: roborazzi-diffs
          path: |
            app/build/outputs/roborazzi/
            app/build/reports/roborazzi/
            app/build/test-results/
          retention-days: 14