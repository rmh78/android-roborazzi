name: Voice integration test

on:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gradle-cache-warmup:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      contents: read
      actions: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Warm Gradle cache (assemble APKs)
        run: bash scripts/run-gradle-cache-warmup.sh

  voice-integration:
    needs: gradle-cache-warmup
    runs-on: ubuntu-latest
    timeout-minutes: 45

    permissions:
      contents: read
      actions: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Require XAI_API_KEY secret
        env:
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
        run: |
          if [ -z "$XAI_API_KEY" ]; then
            echo "::error::XAI_API_KEY repository secret is required for voice integration tests."
            exit 1
          fi

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run voice integration test on emulator
        uses: reactivecircus/android-emulator-runner@v2
        env:
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel_6
          disable-animations: true
          emulator-boot-timeout: 900
          script: bash scripts/run-voice-integration-test.sh

      - name: Upload connected test artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: voice-integration-test-results
          path: |
            app/build/outputs/androidTest-results/
            app/build/reports/androidTests/
          retention-days: 14